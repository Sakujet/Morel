<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirmation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Creepster&family=IBM+Plex+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050505;
      --bg-2: #110909;
      --text: #f3eaea;
      --muted: #a38f8f;
      --accent: #a40000;
      --accent-2: #d10f0f;
      --line: rgba(255, 255, 255, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: "IBM Plex Sans", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 40%, rgba(164, 0, 0, 0.2), transparent 35%),
        radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.03), transparent 55%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        repeating-linear-gradient(
          180deg,
          transparent 0,
          transparent 3px,
          rgba(255,255,255,0.015) 4px
        );
      opacity: 0.35;
      pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed;
      inset: -20%;
      background: radial-gradient(circle, transparent 45%, rgba(0,0,0,0.8) 100%);
      pointer-events: none;
    }

    .wrap {
      width: min(100% - 2rem, 760px);
      text-align: center;
      position: relative;
      z-index: 1;
      animation: apparition 1s ease;
    }

    .mark {
      font-size: 0.9rem;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    h1 {
      margin: 0;
      font-family: "Creepster", cursive;
      font-size: clamp(3rem, 10vw, 7rem);
      font-weight: 400;
      color: var(--text);
      text-shadow:
        0 0 10px rgba(164, 0, 0, 0.45),
        0 0 30px rgba(164, 0, 0, 0.2);
      letter-spacing: 0.02em;
      animation: pulse 2.8s infinite;
    }

    p {
      margin: 1rem auto 0;
      max-width: 34ch;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 2.2rem;
    }

    .btn {
      min-width: 140px;
      border: 1px solid var(--line);
      padding: 0.95rem 1.4rem;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      color: var(--text);
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(4px);
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px) scale(1.02);
    }

    .btn-yes {
      background: linear-gradient(180deg, var(--accent-2), var(--accent));
      border-color: rgba(209, 15, 15, 0.45);
      box-shadow: 0 0 24px rgba(164, 0, 0, 0.25);
    }

    .btn-yes:hover {
      box-shadow: 0 0 34px rgba(209, 15, 15, 0.4);
    }

    .btn-no:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.18);
    }

    #surprise-container {
  display: none;
  margin-top: 2rem;
  align-items: center;
  justify-content: center;
  gap: 1rem;
  flex-wrap: nowrap;
}

    #image-surprise {
      max-width: 400px;
      max-height: 80vh;
      object-fit: contain;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 0 40px rgba(164, 0, 0, 0.35);
    }

    @keyframes apparition {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        text-shadow:
          0 0 10px rgba(164, 0, 0, 0.45),
          0 0 30px rgba(164, 0, 0, 0.2);
      }
      50% {
        transform: scale(1.02);
        text-shadow:
          0 0 14px rgba(209, 15, 15, 0.65),
          0 0 40px rgba(209, 15, 15, 0.28);
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div id="texte-a-cacher">
      <div class="mark">Confirmation</div>
      <h1>Est tu sûr ?</h1>
      <p>Pour des raisons de sécurités nous vous demandons de retourner sur votre choix et d'appuyer sur non.
        <div style="text-align: center;">
          Merci de votre compréhention.
        </div> 
      </p>
      <div class="buttons">
        <button class="btn btn-yes" id="oui" type="button">Oui</button>
        <button class="btn btn-no" id="non" type="button">Non</button>
      </div>
    </div>

    <div id="surprise-container">
      <img id="image-surprise" src="Jarvis.jpg" alt="Image affichée quand on clique sur non" />
      <button class="btn btn-no" id="retour" type="button" style="min-width: 140px; height: fit-content;">Retour</button>
    </div>

    <audio id="son-surprise" src="Jarvis sound-effect.mp3"></audio>
  </main>

  <script>
    const boutonOui = document.getElementById("oui");
    const boutonNon = document.getElementById("non");
    const boutonRetour = document.getElementById("retour");
    const imageSurprise = document.getElementById("image-surprise");
    const sonSurprise = document.getElementById("son-surprise");
    const texteACacher = document.getElementById("texte-a-cacher");
    const surpriseContainer = document.getElementById("surprise-container");

    boutonOui.addEventListener("click", () => {
      texteACacher.style.display = "none";
      surpriseContainer.style.display = "flex";
      sonSurprise.currentTime = 0.5;
      sonSurprise.play();
    });

    boutonNon.addEventListener("click", () => {
      window.location.href = "jeremy.html";
    });

    boutonRetour.addEventListener("click", () => {
      window.location.href = "jeremy.html";
    });
  </script>
</body>
</html>

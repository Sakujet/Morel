<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mon Portfolio - [M]</title>
  <style>
    :root {
  --bg: #70cf99;
  --text: #9e4f99; 
  --muted: #4f6a70;
  --accent: #823bc4;
  --max: 950px;
}

    * {
      box-sizing: border-box;
    }

    body {
  margin: 0;
  font-family: "Chakra Petch", sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at top left, rgba(255,255,255,0.25), transparent 20%),
    linear-gradient(180deg, #b078e1 10%, #da8de7 100%);
  min-height: 100vh;
  display: flex;
  justify-content: flex-start;
  align-items: flex-start;
  padding: 1rem;
  text-align: left;
}

.page {
  width: min(calc(100% - 2rem), var(--max));
  margin: 0; 
  padding-left: 1rem;
}

    header h1 {
      color: var(--accent);
      font-family: "Unbounded", sans-serif;
      font-size: clamp(1.6rem, 5vw, 3rem);
      line-height: 0.95;
      max-width: 15ch;
      margin-bottom: 1rem;
      letter-spacing: -0.03em;
      text-align: left;
      margin-top: 0;
    }

   h2 {
  font-family: "Unbounded", sans-serif;
  font-size: clamp(1.4rem, 3vw, 2rem);
  margin-bottom: 1rem;
  letter-spacing: -0.03em;
  text-align: left;
  margin-top: 2rem;
  color: #5a2a82; /* violet foncé */
}

    p {
      margin: 0 0 1rem 0;
      line-height: 1.8;
      font-size: 1rem;  
      max-width: 100ch;
      text-align: left;
    }

    strong {
      font-weight: 700;
    }

    footer {
      color: var(--#df57c4dd);
      margin-top: 3rem;
      font-size: 0.95rem;
      text-align: left;
    }
   .top-link {
  color: #1e6dff; /* bleu */
  text-decoration: underline;
  text-underline-offset: 0.18em;
  font-size: 1.20rem;
  transition: color 0.3s ease;
}

.top-link:hover {
  color: #ff8000; /* orange clair */
  cursor: pointer;
}

  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1>2éme semaine du stage :</h1>
    </header>

    <main>
      <section>
        <h2>La 2ème semaines est ressemblante a la 1ère :</h2>
        <p>Beaucoup de conférence (notamment IA et Métier) </p>
        <img src="pls.png" width="470" height="290"">
        <p>Travail sur notre portfolio (site internet)</p>
        <p>Puis connaissance de Java + Python</p>
        <img src="p5js.png" width="width="440" height="310">
        </section>
        </main>
      <footer>
      <p><u><strong>Fin de la 2ème semaine.</strong></u></p>
    </footer>
    <div class="top-link">
      <a class="top-link" href="index.html">← Emplois du temps</a>
    </div>
  </div>
</body>
</html>
